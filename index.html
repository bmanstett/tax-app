<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16324f">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Books">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Anstett Consulting, LLC — Books &amp; Tax Organizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2316324f'/><g transform='translate(19,23) scale(0.62)'><path d='M40 0 L60 0 L98 90 L76 90 L67.5 68 L32.5 68 L24 90 L2 90 Z' fill='white'/><path d='M50 24 L61.5 56 L38.5 56 Z' fill='%2316324f'/><path d='M-2 63 L37 50 L41.5 61 L2.5 74 Z' fill='%2316324f'/></g></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <!-- ===== Sidebar (desktop) ===== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 100 90" width="26" height="23" aria-hidden="true"><path d="M40 0 L60 0 L98 90 L76 90 L67.5 68 L32.5 68 L24 90 L2 90 Z" fill="#fff"/><path d="M50 24 L61.5 56 L38.5 56 Z" fill="#16324f"/><path d="M-2 63 L37 50 L41.5 61 L2.5 74 Z" fill="#16324f"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">ANSTETT</div>
        <div class="brand-sub">CONSULTING, LLC</div>
        <div class="brand-tag">Books &amp; Tax Organizer</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"><!-- populated by app.js --></nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" id="theme-toggle" title="Toggle light/dark mode">
        <span class="theme-icon-light">☀️</span><span class="theme-icon-dark">🌙</span>
        <span class="theme-label">Theme</span>
      </button>
      <div class="save-indicator" id="save-indicator" title="Data auto-saves to this browser after every change">
        <span class="save-dot"></span><span id="save-indicator-text">Loaded</span>
      </div>
      <div class="save-indicator" id="sync-indicator" hidden>
        <span id="sync-indicator-icon">☁️</span><span id="sync-indicator-text"></span>
      </div>
    </div>
  </aside>

  <!-- ===== Mobile top bar ===== -->
  <header class="mobile-topbar">
    <div class="brand-mark sm">
      <svg viewBox="0 0 100 90" width="19" height="17" aria-hidden="true"><path d="M40 0 L60 0 L98 90 L76 90 L67.5 68 L32.5 68 L24 90 L2 90 Z" fill="#fff"/><path d="M50 24 L61.5 56 L38.5 56 Z" fill="#16324f"/><path d="M-2 63 L37 50 L41.5 61 L2.5 74 Z" fill="#16324f"/></svg>
    </div>
    <div class="mobile-title" id="mobile-title">Dashboard</div>
    <button class="btn btn-ghost btn-icon" id="sync-mobile" title="Sync now" hidden>☁️</button>
    <button class="btn btn-ghost btn-icon" id="theme-toggle-mobile" title="Toggle theme">
      <span class="theme-icon-light">☀️</span><span class="theme-icon-dark">🌙</span>
    </button>
  </header>

  <!-- ===== Main content ===== -->
  <main id="main" class="main"><!-- views render here --></main>

  <!-- ===== Mobile bottom nav ===== -->
  <nav class="bottom-nav" id="bottom-nav"><!-- populated by app.js --></nav>

  <!-- ===== Quick add FAB ===== -->
  <button class="fab" id="fab" title="Quick add" aria-label="Quick add">+</button>

  <!-- ===== Overlays ===== -->
  <div id="modal-root"></div>
  <div id="sheet-root"></div>
  <div id="toast-root" class="toast-root"></div>
</div>

<!-- Print isolation: documents are cloned in here and ONLY this prints -->
<div id="print-root"></div>

<!-- Order matters: utils → schemas → store → charts → ui → alerts → demo → views → app -->
<script src="js/utils.js"></script>
<script src="js/schemas.js"></script>
<script src="js/store.js"></script>
<script src="js/sync.js"></script>
<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/pdftext.js"></script>
<script src="js/importwo.js"></script>
<script src="js/alerts.js"></script>
<script src="js/demo.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/workorders.js"></script>
<script src="js/views/clients.js"></script>
<script src="js/views/invoices.js"></script>
<script src="js/views/money.js"></script>
<script src="js/views/mileage.js"></script>
<script src="js/views/assets.js"></script>
<script src="js/views/taxes.js"></script>
<script src="js/views/reports.js"></script>
<script src="js/views/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
